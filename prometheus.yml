global:
  scrape_interval: 20s

remote_write:
  - url: https://prometheus-prod-66-prod-us-east-3.grafana.net/api/prom/push
    basic_auth:
      username: 3086746
      password: ${GRAFANA_CLOUD_TOKEN}

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'deye-mcp'
    scheme: https
    static_configs:
      - targets: ['deye-mcp.dibeji.ai']
    http_headers:
      X-API-Key:
        values:
          - ${DEYE_API_KEY}

  - job_name: 'dt-backend'
    scheme: https
    static_configs:
      - targets: ['api.dibeji.ai']
    http_headers:
      X-API-Key:
        values:
          - ${DT_BACKEND_API_KEY}

  - job_name: 'dt-intel'
    scheme: https
    static_configs:
      - targets: ['intel.dibeji.ai']
    http_headers:
      X-API-Key:
        values:
          - ${INTEL_API_KEY}

  - job_name: 'dt-boq'
    scheme: https
    static_configs:
      - targets: ['boq.dibeji.ai']
    http_headers:
      X-API-Key:
        values:
          - ${DT_BOQ_API_KEY}